name: Release Package Zip

on:
  # Git-only stable distribution is active for now; tag/GitHub releases are deferred.
  # Do not trigger release mode without a dedicated release wave.
  workflow_dispatch:
    inputs:
      confirm_release:
        description: "Type exactly: I understand this publishes a Deucarian package"
        required: true
        type: string
        default: ""

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Git-only release policy guard
        shell: pwsh
        env:
          INPUT_CONFIRM_RELEASE: ${{ inputs.confirm_release }}
        run: |
          if ($env:INPUT_CONFIRM_RELEASE -ne "I understand this publishes a Deucarian package") {
            Write-Error "::error::Release workflows require exact confirm_release acknowledgement."
            exit 1
          }
          Write-Error "::error::Git-only stable distribution is active for now; tag and GitHub release creation are deferred to a dedicated release wave."
          exit 1
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Validate package structure
        shell: pwsh
        run: ./Tools/Validate-Package.ps1

      - name: Create release zip
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $zip = "object-selection-core-state-integration-$tag.zip"
          $exclude = @(".git", "Library", "Temp", "Obj", "Build", "Builds", "Logs")
          $items = Get-ChildItem -Force | Where-Object { $exclude -notcontains $_.Name }
          Compress-Archive -Path $items.FullName -DestinationPath $zip -Force
          "ZIP_PATH=$zip" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Publish GitHub release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" $env:ZIP_PATH --title "${{ github.ref_name }}" --notes "Object Selection Core State Integration package release ${{ github.ref_name }}"
