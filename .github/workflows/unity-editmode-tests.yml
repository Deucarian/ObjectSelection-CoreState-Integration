name: Unity EditMode Tests

on:
  workflow_dispatch:

jobs:
  editmode:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Create package test project manifest
        shell: bash
        run: |
          mkdir -p ObjectSelectionCoreStateIntegration-TestProject/Packages ObjectSelectionCoreStateIntegration-TestProject/Assets
          package_path="${GITHUB_WORKSPACE}"
          cat > ObjectSelectionCoreStateIntegration-TestProject/Packages/manifest.json <<JSON
          {
            "dependencies": {
              "com.deucarian.logging": "https://github.com/Deucarian/Logging.git#abf576b112f86762c775436fb3e477d61e8e9501",
              "com.deucarian.object-selection": "https://github.com/Deucarian/Object-Selection.git#dac96e9a216f4978af6ef3d4cdecd0abe0d65467",
              "com.deucarian.core-state": "https://github.com/Deucarian/Core-State.git#f1687af4f4bbcb0e2df8c40d2560a9924f4c8f94",
              "com.deucarian.object-selection.core-state-integration": "file:${package_path}",
              "com.unity.test-framework": "1.1.33"
            },
            "testables": [
              "com.deucarian.object-selection.core-state-integration"
            ]
          }
          JSON

      - name: Run EditMode tests
        uses: game-ci/unity-test-runner@0ff419b913a3630032cbe0de48a0099b5a9f0ed9 # v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          projectPath: ObjectSelectionCoreStateIntegration-TestProject
          unityVersion: 2021.3.45f1
          testMode: editmode

      - name: Upload test artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: always()
        with:
          name: unity-editmode-test-results
          path: artifacts
